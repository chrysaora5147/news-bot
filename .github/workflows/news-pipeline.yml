name: News Pipeline

on:
  push:
    branches: [main]
    paths:
      - "scripts/news_pipeline.py"
      - ".github/workflows/news-pipeline.yml"
  workflow_dispatch:
    inputs:
      send_line:
        description: "Send LINE digest after collecting news"
        required: false
        default: "false"
  schedule:
    # 07:00, 12:00, 18:00 Asia/Bangkok
    - cron: "0 0,5,11 * * *"

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run news pipeline
        env:
          RSS_FEEDS: ${{ vars.RSS_FEEDS }}
          NEWS_SEARCH_QUERIES: ${{ vars.NEWS_SEARCH_QUERIES }}
          MAX_ARTICLES_PER_RUN: ${{ vars.MAX_ARTICLES_PER_RUN }}
          SEND_LINE_DIGEST: ${{ github.event.inputs.send_line || vars.SEND_LINE_DIGEST || 'false' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_IDS: ${{ secrets.LINE_TO_IDS }}
          LINE_BROADCAST: ${{ vars.LINE_BROADCAST || 'false' }}
          LINE_REQUIRE_APPROVAL: ${{ vars.LINE_REQUIRE_APPROVAL || 'true' }}
        run: python scripts/news_pipeline.py
